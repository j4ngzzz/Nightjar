name: Publish Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Required to push to ghcr.io using GITHUB_TOKEN (no PAT needed)
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push to ghcr.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # linux/amd64 only — Dafny does not ship ARM Linux binaries
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/nightjar:latest
            ghcr.io/${{ github.repository_owner }}/nightjar:${{ github.ref_name }}
          build-args: |
            DAFNY_VERSION=4.8.1
          # Layer cache across workflow runs to speed up rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max
