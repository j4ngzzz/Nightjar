name: Nightjar Verify

on:
  push:
    branches: [master]
    paths: ['src/**', '*.toml', '.card/**']
  schedule:
    - cron: '0 9 * * 1'  # Weekly Monday 9 AM UTC
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]" --no-cache-dir
      - name: Diagnose import
        run: python -c "import nightjar; print('nightjar import ok:', nightjar.__version__)"
      - name: Run unit tests
        run: >-
          python -m pytest tests/unit/
          --import-mode=importlib
          -p no:logfire
          -p no:randomly
          -p no:sugar
          -m "not integration"
          --tb=short
          -q
        timeout-minutes: 10
      - name: Verify Nightjar specs (dogfooding)
        run: |
          python -c "
          from nightjar.parser import parse_card_spec
          from pathlib import Path
          specs = list(Path('.card').glob('*.card.md'))
          print(f'Parsing {len(specs)} specs...')
          for spec_path in specs:
              try:
                  spec = parse_card_spec(spec_path)
                  print(f'  OK  {spec_path.name}: {len(spec.invariants)} invariants')
              except Exception as e:
                  print(f'  FAIL {spec_path.name}: {e}')
                  exit(1)
          print(f'All {len(specs)} specs valid.')
          "
