name: Nightjar Verify

on:
  push:
    branches: [master]
    paths: ['src/**', '*.toml', '.card/**']
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NIGHTJAR_DISABLE_CACHE: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -e ".[dev]" --no-cache-dir
      - name: Verify nightjar imports
        run: python -c "import nightjar.cli; print('nightjar import OK')"
      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ \
            -m "not integration" \
            -p no:logfire \
            -p no:randomly \
            -p no:sugar \
            --import-mode=importlib \
            --tb=short -q
        timeout-minutes: 10
      - name: Verify specs (dogfooding)
        run: |
          python -c "
          from nightjar.parser import parse_card_spec
          from pathlib import Path
          specs = list(Path('.card').glob('*.card.md'))
          print(f'Parsing {len(specs)} specs...')
          for spec_path in specs:
              try:
                  spec = parse_card_spec(spec_path)
                  print(f'  OK  {spec_path.name}: {len(spec.invariants)} invariants')
              except Exception as e:
                  print(f'  FAIL {spec_path.name}: {e}')
                  exit(1)
          print(f'All {len(specs)} specs valid.')
          "
