# docs/content/ci-examples/cli-tool.yml
#
# Nightjar CI for a Python CLI tool (e.g. built with Click or Typer).
#
# Copy to: .github/workflows/nightjar.yml in your CLI project.
#
# What this does:
#   - Runs pytest across all three major platforms (ubuntu, macos, windows)
#     to catch platform-specific edge cases in CLI argument handling
#   - Builds a wheel + sdist and uploads as a workflow artifact
#   - Verifies all .card/*.card.md contracts with Nightjar
#   - Fast mode (Hypothesis only, ~5s) on every PR
#   - Full mode (Hypothesis + Dafny formal proof, ~30s) on push to main
#   - Uploads SARIF results to GitHub Code Scanning
#
# Requirements:
#   - pyproject.toml in repo root with [project.scripts] entry point
#   - python -m build available (add "build" to dev deps)
#   - .card/*.card.md spec files generated by `nightjar init`
#   - GitHub Advanced Security enabled for SARIF on private repos
#     (free for all public repos)

name: Nightjar Verification

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "**.py"
      - ".card/**"
      - "*.toml"
  pull_request:
    paths:
      - "src/**"
      - "**.py"
      - ".card/**"
      - "*.toml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required for SARIF upload to GitHub Code Scanning
  pull-requests: write     # required for PR violation comment

jobs:
  # ------------------------------------------------------------------
  # Cross-platform test matrix
  # CLI tools must work on Linux, macOS, and Windows.
  # ------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" --no-cache-dir

      - name: Verify CLI entry point is importable
        run: python -c "import nightcap.cli; print('CLI import OK')"

      - name: Run tests
        run: |
          python -m pytest tests/ \
            -p no:logfire \
            -p no:randomly \
            -p no:sugar \
            --import-mode=importlib \
            --tb=short -q
        timeout-minutes: 10

  # ------------------------------------------------------------------
  # Build wheel + sdist and upload as artifact
  # ------------------------------------------------------------------
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build
        run: pip install build --no-cache-dir

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ------------------------------------------------------------------
  # Nightjar fast verification — runs on every PR (Hypothesis only, ~5s)
  # ------------------------------------------------------------------
  verify-fast:
    name: Nightjar (fast)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Nightjar (fast mode)
        id: nightjar
        uses: j4ngzzz/Nightjar@v1
        with:
          fast: "true"
          upload-sarif: "true"
          fail-on-violation: "true"

      - name: Comment on PR if violations found
        if: steps.nightjar.outputs.result == 'fail'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '**Nightjar found ${{ steps.nightjar.outputs.violation-count }} contract violation(s).**',
                '',
                'See **Security > Code Scanning Alerts** for counterexamples pinned to the exact line.',
                '',
                'Run `nightjar verify --fast` locally to reproduce.'
              ].join('\n')
            })

  # ------------------------------------------------------------------
  # Nightjar full verification — runs on push to main (+ Dafny, ~30s)
  # ------------------------------------------------------------------
  verify-full:
    name: Nightjar (full)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Nightjar (full pipeline)
        id: nightjar
        uses: j4ngzzz/Nightjar@v1
        with:
          fast: "false"
          upload-sarif: "true"
          fail-on-violation: "true"
          dafny-version: "4.9.0"

      - name: Report verification result
        if: always()
        run: |
          echo "Result:     ${{ steps.nightjar.outputs.result }}"
          echo "Violations: ${{ steps.nightjar.outputs.violation-count }}"
          echo "SARIF:      ${{ steps.nightjar.outputs.sarif-file }}"
