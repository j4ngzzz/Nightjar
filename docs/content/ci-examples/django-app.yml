# docs/content/ci-examples/django-app.yml
#
# Nightjar CI for a Django application.
#
# Copy to: .github/workflows/nightjar.yml in your Django project.
#
# What this does:
#   - Runs manage.py check (system checks) and migrate before tests
#   - Detects unapplied migrations with `migrate --check`
#   - Runs the Django test suite via pytest-django against Postgres
#   - Verifies all .card/*.card.md contracts with Nightjar
#   - Fast mode (Hypothesis only, ~5s) on every PR
#   - Full mode (Hypothesis + Dafny formal proof, ~30s) on push to main
#   - Uploads SARIF results to GitHub Code Scanning
#
# Requirements:
#   - pyproject.toml in repo root (pytest-django as a dev dep)
#   - DJANGO_SETTINGS_MODULE pointing to a settings file that reads
#     DATABASE_URL from the environment
#   - .card/*.card.md spec files generated by `nightjar init`
#   - GitHub Advanced Security enabled for SARIF on private repos
#     (free for all public repos)
#
# Django settings tip: use dj-database-url or django-environ to parse
# DATABASE_URL automatically. Example:
#
#   DATABASES = {"default": dj_database_url.config(conn_max_age=600)}

name: Nightjar Verification

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "**.py"
      - ".card/**"
      - "*.toml"
      - "**/migrations/**"
  pull_request:
    paths:
      - "src/**"
      - "**.py"
      - ".card/**"
      - "*.toml"
      - "**/migrations/**"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required for SARIF upload to GitHub Code Scanning
  pull-requests: write     # required for PR violation comment

jobs:
  # ------------------------------------------------------------------
  # Application test suite (pytest-django + Postgres)
  # ------------------------------------------------------------------
  test:
    name: Test suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: store_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DJANGO_SETTINGS_MODULE: store.settings.test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/store_test
      # A fake SECRET_KEY for CI only — not used in production.
      SECRET_KEY: django-insecure-ci-only-not-for-production-2f8x9k3mq7nw4vbz1y

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" --no-cache-dir

      - name: Django system checks
        run: python manage.py check --deploy 2>/dev/null || python manage.py check

      - name: Check for unapplied migrations
        run: python manage.py migrate --check
        # Fails if there are migrations that haven't been applied.
        # This catches missing `makemigrations` calls before they hit prod.

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: |
          python -m pytest tests/ \
            -p no:logfire \
            -p no:randomly \
            -p no:sugar \
            --import-mode=importlib \
            --reuse-db \
            --tb=short -q
        timeout-minutes: 15

  # ------------------------------------------------------------------
  # Nightjar fast verification — runs on every PR (Hypothesis only, ~5s)
  # ------------------------------------------------------------------
  verify-fast:
    name: Nightjar (fast)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Nightjar (fast mode)
        id: nightjar
        uses: j4ngzzz/Nightjar@v1
        with:
          fast: "true"
          upload-sarif: "true"
          fail-on-violation: "true"

      - name: Comment on PR if violations found
        if: steps.nightjar.outputs.result == 'fail'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '**Nightjar found ${{ steps.nightjar.outputs.violation-count }} contract violation(s).**',
                '',
                'See **Security > Code Scanning Alerts** for counterexamples pinned to the exact line.',
                '',
                'Run `nightjar verify --fast` locally to reproduce.'
              ].join('\n')
            })

  # ------------------------------------------------------------------
  # Nightjar full verification — runs on push to main (+ Dafny, ~30s)
  # ------------------------------------------------------------------
  verify-full:
    name: Nightjar (full)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Nightjar (full pipeline)
        id: nightjar
        uses: j4ngzzz/Nightjar@v1
        with:
          fast: "false"
          upload-sarif: "true"
          fail-on-violation: "true"
          dafny-version: "4.9.0"

      - name: Report verification result
        if: always()
        run: |
          echo "Result:     ${{ steps.nightjar.outputs.result }}"
          echo "Violations: ${{ steps.nightjar.outputs.violation-count }}"
          echo "SARIF:      ${{ steps.nightjar.outputs.sarif-file }}"
