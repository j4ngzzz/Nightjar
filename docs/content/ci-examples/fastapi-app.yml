# docs/content/ci-examples/fastapi-app.yml
#
# Nightjar CI for a FastAPI application.
#
# Copy to: .github/workflows/nightjar.yml in your FastAPI project.
#
# What this does:
#   - Lints with ruff and type-checks with mypy
#   - Runs pytest-asyncio against a live Postgres service container
#   - Verifies all .card/*.card.md contracts with Nightjar
#   - Fast mode (Hypothesis only, ~5s) on every PR with inline PR annotations
#   - Full mode (Hypothesis + Dafny formal proof, ~30s) on push to main
#   - Uploads SARIF results to GitHub Code Scanning
#
# Requirements:
#   - pyproject.toml in repo root (ruff, mypy, pytest-asyncio, httpx as dev deps)
#   - .card/*.card.md spec files generated by `nightjar init`
#   - GitHub Advanced Security enabled for SARIF on private repos
#     (free for all public repos)

name: Nightjar Verification

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "**.py"
      - ".card/**"
      - "*.toml"
  pull_request:
    paths:
      - "src/**"
      - "**.py"
      - ".card/**"
      - "*.toml"
  workflow_dispatch:
    inputs:
      fast:
        description: "Run in fast mode (skip Dafny)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  security-events: write   # required for SARIF upload to GitHub Code Scanning
  pull-requests: write     # required for PR violation comment

jobs:
  # ------------------------------------------------------------------
  # Lint + type check (ruff + mypy)
  # Runs on all events. Fast (~10s). Catches style and type errors early.
  # ------------------------------------------------------------------
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" --no-cache-dir

      - name: Lint with ruff
        run: python -m ruff check src/ tests/

      - name: Type-check with mypy
        run: python -m mypy src/ --ignore-missing-imports

  # ------------------------------------------------------------------
  # Application test suite (pytest-asyncio + httpx TestClient + Postgres)
  # ------------------------------------------------------------------
  test:
    name: Test suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: payments_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/payments_test
      ENVIRONMENT: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" --no-cache-dir

      - name: Run tests
        run: |
          python -m pytest tests/ \
            -p no:logfire \
            -p no:randomly \
            -p no:sugar \
            --import-mode=importlib \
            --asyncio-mode=auto \
            --tb=short -q
        timeout-minutes: 10

  # ------------------------------------------------------------------
  # Nightjar fast verification — runs on every PR (Hypothesis only, ~5s)
  # ------------------------------------------------------------------
  verify-fast:
    name: Nightjar (fast)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Nightjar (fast mode)
        id: nightjar
        uses: j4ngzzz/Nightjar@v1
        with:
          fast: "true"
          upload-sarif: "true"
          fail-on-violation: "true"

      - name: Comment on PR if violations found
        if: steps.nightjar.outputs.result == 'fail'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '**Nightjar found ${{ steps.nightjar.outputs.violation-count }} contract violation(s).**',
                '',
                'See **Security > Code Scanning Alerts** for counterexamples pinned to the exact line.',
                '',
                'Run `nightjar verify --fast` locally to reproduce.'
              ].join('\n')
            })

  # ------------------------------------------------------------------
  # Nightjar full verification — runs on push to main (+ Dafny, ~30s)
  # ------------------------------------------------------------------
  verify-full:
    name: Nightjar (full)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Nightjar (full pipeline)
        id: nightjar
        uses: j4ngzzz/Nightjar@v1
        with:
          fast: ${{ inputs.fast || 'false' }}
          upload-sarif: "true"
          fail-on-violation: "true"
          dafny-version: "4.9.0"

      - name: Report verification result
        if: always()
        run: |
          echo "Result:     ${{ steps.nightjar.outputs.result }}"
          echo "Violations: ${{ steps.nightjar.outputs.violation-count }}"
          echo "SARIF:      ${{ steps.nightjar.outputs.sarif-file }}"
