# docs/content/ci-examples/library.yml
#
# Nightjar CI for a Python library (published to PyPI).
#
# Copy to: .github/workflows/nightjar.yml in your library project.
#
# What this does:
#   - Runs pytest across Python 3.11, 3.12, and 3.13 to verify
#     forward-compatibility before every release
#   - Verifies all .card/*.card.md contracts with Nightjar
#   - Fast mode (Hypothesis only, ~5s) on every PR
#   - Full mode (Hypothesis + Dafny formal proof, ~30s) on push to main
#   - Uploads SARIF results to GitHub Code Scanning
#   - Publishes to PyPI when a GitHub Release is published (tag v*)
#     Only publishes if both test matrix AND verify-full pass
#
# Requirements:
#   - pyproject.toml in repo root with [build-system] table
#   - python -m build available (add "build" to dev deps)
#   - .card/*.card.md spec files generated by `nightjar init`
#   - A PyPI environment named "pypi" configured in repo Settings >
#     Environments with the PYPI_API_TOKEN secret
#   - GitHub Advanced Security enabled for SARIF on private repos
#     (free for all public repos)
#
# PyPI setup (one-time):
#   1. Settings > Environments > New environment > name: pypi
#   2. Add secret: PYPI_API_TOKEN  (paste your token from pypi.org/manage/account/token/)
#   3. Optionally: restrict environment to protected tags (v*)

name: Nightjar Verification

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "**.py"
      - ".card/**"
      - "*.toml"
  pull_request:
    paths:
      - "src/**"
      - "**.py"
      - ".card/**"
      - "*.toml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required for SARIF upload to GitHub Code Scanning
  pull-requests: write     # required for PR violation comment

jobs:
  # ------------------------------------------------------------------
  # Multi-version test matrix (Python 3.11, 3.12, 3.13)
  # Libraries must not silently break on older or newer Python versions.
  # ------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" --no-cache-dir

      - name: Run tests
        run: |
          python -m pytest tests/ \
            -p no:logfire \
            -p no:randomly \
            -p no:sugar \
            --import-mode=importlib \
            --tb=short -q
        timeout-minutes: 10

  # ------------------------------------------------------------------
  # Nightjar fast verification — runs on every PR (Hypothesis only, ~5s)
  # ------------------------------------------------------------------
  verify-fast:
    name: Nightjar (fast)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Nightjar (fast mode)
        id: nightjar
        uses: j4ngzzz/Nightjar@v1
        with:
          fast: "true"
          upload-sarif: "true"
          fail-on-violation: "true"

      - name: Comment on PR if violations found
        if: steps.nightjar.outputs.result == 'fail'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '**Nightjar found ${{ steps.nightjar.outputs.violation-count }} contract violation(s).**',
                '',
                'See **Security > Code Scanning Alerts** for counterexamples pinned to the exact line.',
                '',
                'Run `nightjar verify --fast` locally to reproduce.'
              ].join('\n')
            })

  # ------------------------------------------------------------------
  # Nightjar full verification — runs on push to main (+ Dafny, ~30s)
  # ------------------------------------------------------------------
  verify-full:
    name: Nightjar (full)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch'

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Nightjar (full pipeline)
        id: nightjar
        uses: j4ngzzz/Nightjar@v1
        with:
          fast: "false"
          upload-sarif: "true"
          fail-on-violation: "true"
          dafny-version: "4.9.0"

      - name: Report verification result
        if: always()
        run: |
          echo "Result:     ${{ steps.nightjar.outputs.result }}"
          echo "Violations: ${{ steps.nightjar.outputs.violation-count }}"
          echo "SARIF:      ${{ steps.nightjar.outputs.sarif-file }}"

  # ------------------------------------------------------------------
  # Publish to PyPI — only runs when a GitHub Release is published
  # Requires test matrix (all 3 Python versions) AND verify-full to pass.
  # ------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: [test, verify-full]
    environment:
      name: pypi
      url: https://pypi.org/p/invariant-utils

    permissions:
      id-token: write   # required for trusted publishing (OIDC)
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build
        run: pip install build --no-cache-dir

      - name: Build wheel and sdist
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
