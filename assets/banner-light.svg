<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240">
  <!-- Background: warm off-white for light mode -->
  <rect width="1200" height="240" fill="#FAFAF8"/>

  <!-- Subtle ambient warmth -->
  <radialGradient id="bannerGlowLight" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#D4920A" stop-opacity="0.05"/>
    <stop offset="100%" stop-color="#D4920A" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="240" fill="url(#bannerGlowLight)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="#D4920A" opacity="0.8"/>
  <!-- Bottom accent line -->
  <rect x="0" y="238" width="1200" height="2" fill="#D4920A" opacity="0.3"/>

  <!-- Left accent bar -->
  <rect x="60" y="48" width="3" height="144" fill="#D4920A" opacity="0.9"/>

  <!-- Nightjar wordmark — dark amber for light backgrounds -->
  <text x="84" y="128"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="72"
        font-weight="600"
        fill="#A06A00"
        letter-spacing="-1">NIGHTJAR</text>

  <!-- Tagline — dark text for light mode -->
  <text x="86" y="172"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="20"
        font-weight="400"
        fill="#1A1510"
        opacity="0.75">Formally verify AI-generated code — not tested, proved.</text>

  <!-- Right side: small seal icon (darker for light mode) -->
  <polygon points="1120,60 1166,86 1166,138 1120,164 1074,138 1074,86"
           fill="none" stroke="#A06A00" stroke-width="1.2" opacity="0.7"/>
  <polygon points="1120,76 1152,94 1152,130 1120,148 1088,130 1088,94"
           fill="none" stroke="#A06A00" stroke-width="0.5" opacity="0.3"/>
  <circle cx="1120" cy="112" r="14" fill="#FAFAF8" stroke="#A06A00" stroke-width="1.5"/>
  <circle cx="1120" cy="112" r="8" fill="#D4920A" opacity="0.9"/>
</svg>
