<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&amp;display=swap');
    </style>
  </defs>

  <!-- Background: warm near-black #0D0B09 -->
  <rect width="1280" height="640" fill="#0D0B09"/>

  <!-- Very subtle grid texture (15% opacity amber lines) -->
  <g opacity="0.06" stroke="#D4920A" stroke-width="0.5">
    <!-- Vertical lines -->
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="128" x2="1280" y2="128"/>
    <line x1="0" y1="256" x2="1280" y2="256"/>
    <line x1="0" y1="384" x2="1280" y2="384"/>
    <line x1="0" y1="512" x2="1280" y2="512"/>
  </g>

  <!-- Faint ambient glow in center-left area -->
  <radialGradient id="ambientGlow" cx="38%" cy="50%" r="45%">
    <stop offset="0%" stop-color="#D4920A" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#D4920A" stop-opacity="0"/>
  </radialGradient>
  <rect width="1280" height="640" fill="url(#ambientGlow)"/>

  <!-- Left accent bar -->
  <rect x="80" y="160" width="3" height="320" fill="#D4920A" opacity="0.8"/>

  <!-- Nightjar wordmark -->
  <text x="116" y="258"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="96"
        font-weight="600"
        fill="#D4920A"
        letter-spacing="-2">NIGHTJAR</text>

  <!-- Tagline -->
  <text x="118" y="322"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="28"
        font-weight="400"
        fill="#F5F0E8"
        opacity="0.9">Formally verify AI-generated code.</text>
  <text x="118" y="358"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="28"
        font-weight="400"
        fill="#F5B93A">Not tested — proved.</text>

  <!-- Separator line -->
  <line x1="118" y1="400" x2="780" y2="400" stroke="#2A2315" stroke-width="1"/>

  <!-- Credibility stat chips -->
  <!-- Chip 1: 21 bugs found -->
  <rect x="118" y="420" width="248" height="44" rx="4" fill="#141109" stroke="#4A3A1A" stroke-width="1"/>
  <text x="242" y="448"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="14"
        font-weight="600"
        fill="#D4920A"
        text-anchor="middle">21 bugs found · 9 packages</text>

  <!-- Chip 2: Dafny 4.x -->
  <rect x="382" y="420" width="160" height="44" rx="4" fill="#141109" stroke="#4A3A1A" stroke-width="1"/>
  <text x="462" y="448"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="14"
        font-weight="600"
        fill="#D4920A"
        text-anchor="middle">Dafny 4.x</text>

  <!-- Chip 3: CEGIS Repair -->
  <rect x="558" y="420" width="180" height="44" rx="4" fill="#141109" stroke="#4A3A1A" stroke-width="1"/>
  <text x="648" y="448"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="14"
        font-weight="600"
        fill="#D4920A"
        text-anchor="middle">CEGIS Repair</text>

  <!-- Right side: Verification Seal (hexagonal) -->
  <!-- Hexagon centered at (1020, 320), radius 130 -->
  <polygon points="1020,190 1132.6,255 1132.6,385 1020,450 907.4,385 907.4,255"
           fill="none" stroke="#D4920A" stroke-width="1.5" opacity="0.9"/>

  <!-- Inner hexagon at 0.72 scale -->
  <polygon points="1020,226.4 1113.5,280.2 1113.5,387.8 1020,441.6 926.5,387.8 926.5,280.2"
           fill="none" stroke="#D4920A" stroke-width="0.5" opacity="0.4"/>

  <!-- Inner hexagon at 0.44 scale -->
  <polygon points="1020,262.8 1077.2,294.8 1077.2,358.8 1020,390.8 962.8,358.8 962.8,294.8"
           fill="none" stroke="#F5B93A" stroke-width="0.5" opacity="0.5"/>

  <!-- Radial lines from center (6-fold symmetry) -->
  <g stroke="#D4920A" stroke-width="0.5" opacity="0.3">
    <line x1="1020" y1="320" x2="1020" y2="190"/>
    <line x1="1020" y1="320" x2="1132.6" y2="255"/>
    <line x1="1020" y1="320" x2="1132.6" y2="385"/>
    <line x1="1020" y1="320" x2="1020" y2="450"/>
    <line x1="1020" y1="320" x2="907.4" y2="385"/>
    <line x1="1020" y1="320" x2="907.4" y2="255"/>
  </g>

  <!-- Central node (amber filled circle) -->
  <circle cx="1020" cy="320" r="28" fill="#141109" stroke="#F5B93A" stroke-width="2"/>
  <circle cx="1020" cy="320" r="18" fill="#D4920A" opacity="0.9"/>
  <circle cx="1020" cy="320" r="8" fill="#FFD060"/>

  <!-- "VERIFIED" text below seal -->
  <text x="1020" y="490"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="13"
        font-weight="600"
        fill="#D4920A"
        text-anchor="middle"
        letter-spacing="0.12em">VERIFIED</text>

  <!-- Bottom-right: subtle attribution -->
  <text x="1200" y="610"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="11"
        fill="#9A8E78"
        opacity="0.5"
        text-anchor="end">nightjar.dev</text>

  <!-- Top border accent line -->
  <rect x="0" y="0" width="1280" height="2" fill="#D4920A" opacity="0.6"/>
</svg>
