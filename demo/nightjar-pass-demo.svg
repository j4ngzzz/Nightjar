<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <clipPath id="content-clip">
      <rect x="0" y="42" width="800" height="458"/>
    </clipPath>
    <!-- Amber glow filter for result line -->
    <filter id="amber-glow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Terminal background (warm dark) -->
  <rect width="800" height="500" rx="12" fill="#0d0b09"/>

  <!-- Title bar -->
  <rect width="800" height="40" rx="12" fill="#1a1714"/>
  <rect y="28" width="800" height="12" fill="#1a1714"/>
  <rect y="39" width="800" height="1" fill="#2e2a25"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="20" r="6" fill="#27c93f"/>

  <!-- Title bar text -->
  <text x="400" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#6b6358">nightjar — all stages pass</text>

  <!-- Content area -->
  <g clip-path="url(#content-clip)">

    <!-- LINE 0: command prompt -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.3s" fill="freeze"/>
      <text x="26" y="72" font-family="monospace" font-size="14" fill="#d4920a" font-weight="bold">$</text>
      <text x="40" y="72" font-family="monospace" font-size="14" fill="#f0ebe3" font-weight="bold">nightjar verify --spec .card/payment.card.md</text>
    </g>

    <!-- LINE 1: pipeline header -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.3s" fill="freeze"/>
      <text x="26" y="99" font-family="monospace" font-size="14" fill="#c8a97e" font-weight="bold">Nightjar Verification Pipeline</text>
    </g>

    <!-- LINE 2: spec info -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.3s" fill="freeze"/>
      <text x="26" y="117" font-family="monospace" font-size="12" fill="#7a7168">Spec: payment  ·  3 invariants  ·  model: claude-sonnet-4-6</text>
    </g>

    <!-- divider line 1 -->
    <rect x="26" y="125" width="748" height="1" fill="#2e2a25" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.2s" fill="freeze"/>
    </rect>

    <!-- LINE 3: Stage 0 PASS -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.3s" fill="freeze"/>
      <text x="26" y="148" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="78" y="148" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 0</text>
      <text x="156" y="148" font-family="monospace" font-size="13" fill="#6b6358">(preflight)</text>
      <text x="700" y="148" font-family="monospace" font-size="12" fill="#4a4540">12ms</text>
    </g>

    <!-- LINE 4: Stage 1 PASS -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.1s" dur="0.3s" fill="freeze"/>
      <text x="26" y="170" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="78" y="170" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 1</text>
      <text x="156" y="170" font-family="monospace" font-size="13" fill="#6b6358">(deps)</text>
      <text x="700" y="170" font-family="monospace" font-size="12" fill="#4a4540">8ms</text>
    </g>

    <!-- LINE 5: Stage 2 PASS -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.5s" dur="0.3s" fill="freeze"/>
      <text x="26" y="192" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="78" y="192" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 2</text>
      <text x="156" y="192" font-family="monospace" font-size="13" fill="#6b6358">(schema)</text>
      <text x="700" y="192" font-family="monospace" font-size="12" fill="#4a4540">15ms</text>
    </g>

    <!-- LINE 6: Stage 3 PASS -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.9s" dur="0.3s" fill="freeze"/>
      <text x="26" y="214" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="78" y="214" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 3</text>
      <text x="156" y="214" font-family="monospace" font-size="13" fill="#6b6358">(property-tests)</text>
      <text x="700" y="214" font-family="monospace" font-size="12" fill="#4a4540">298ms</text>
    </g>

    <!-- PBT note -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.3s" fill="freeze"/>
      <text x="32" y="231" font-family="monospace" font-size="11" fill="#4a7a4a" font-style="italic">100 examples ·  all invariants satisfied ·  no counterexamples found</text>
    </g>

    <!-- LINE 7: Stage 4 PASS (formal proof) -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.3s" fill="freeze"/>
      <text x="26" y="255" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="78" y="255" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 4</text>
      <text x="156" y="255" font-family="monospace" font-size="13" fill="#6b6358">(formal-proof)</text>
      <text x="700" y="255" font-family="monospace" font-size="12" fill="#4a4540">2.4s</text>
    </g>

    <!-- Dafny proof note -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.1s" dur="0.3s" fill="freeze"/>
      <text x="32" y="272" font-family="monospace" font-size="11" fill="#4a7a4a" font-style="italic">Dafny verified: 3/3 ensures clauses ·  0 verification errors</text>
    </g>

    <!-- divider line 2 -->
    <rect x="26" y="284" width="748" height="1" fill="#2e2a25" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.4s" dur="0.2s" fill="freeze"/>
    </rect>

    <!-- Amber glow background for result block -->
    <rect x="26" y="292" width="748" height="128" rx="6" fill="#120e06" stroke="#4a3410" stroke-width="1" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.7s" dur="0.4s" fill="freeze"/>
    </rect>

    <!-- Subtle amber inner glow -->
    <rect x="27" y="293" width="746" height="126" rx="5" fill="none" stroke="#d4920a" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" from="0" to="0.4" begin="4.7s" dur="0.6s" fill="freeze"/>
    </rect>

    <!-- Result block content -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.7s" dur="0.4s" fill="freeze"/>

      <!-- Result label + PASS badge -->
      <text x="42" y="318" font-family="monospace" font-size="12" fill="#7a7168">Result</text>
      <rect x="660" y="303" width="96" height="22" rx="4" fill="#1a3d1a"/>
      <text x="708" y="318" text-anchor="middle" font-family="monospace" font-size="11" fill="#3fb950" font-weight="bold">ALL PASSED</text>

      <!-- Trust level + FORMALLY_VERIFIED badge -->
      <text x="42" y="346" font-family="monospace" font-size="12" fill="#7a7168">Trust level</text>
      <rect x="468" y="331" width="288" height="22" rx="4" fill="#241800" stroke="#d4920a" stroke-width="1"/>
      <text x="612" y="346" text-anchor="middle" font-family="monospace" font-size="11" fill="#d4920a" font-weight="bold">FORMALLY_VERIFIED (1.00)</text>

      <!-- Timing note -->
      <text x="42" y="388" font-family="monospace" font-size="12" fill="#4a4540">Total: 2.7s  ·  Mathematical proof complete ·  safe to ship</text>

      <!-- Checkmark / celebration line -->
      <text x="42" y="408" font-family="monospace" font-size="12" fill="#7a6030">All 3 invariants hold for all inputs ·  Dafny certificate generated</text>
    </g>

  </g>
</svg>
