<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540">
  <defs>
    <clipPath id="terminal-body-clip">
      <rect x="0" y="42" width="800" height="498"/>
    </clipPath>
    <clipPath id="typing-clip">
      <rect x="40" y="54" height="20" width="0">
        <animate
          attributeName="width"
          calcMode="discrete"
          values="0;8.4;16.8;25.2;33.6;42.0;50.4;58.8;67.2;75.6;84.0;92.4;100.8;109.2;117.6;126.0;134.4;142.8;151.2;159.6;168.0;176.4;184.8;193.2;201.6;210.0;218.4;226.8;235.2;243.6;252.0;260.4;268.8;277.2;285.6;294.0;302.4;310.8;319.2;327.6;336.0;344.4;352.8;361.2;369.6"
          keyTimes="0.0000;0.0227;0.0455;0.0682;0.0909;0.1136;0.1364;0.1591;0.1818;0.2045;0.2273;0.2500;0.2727;0.2955;0.3182;0.3409;0.3636;0.3864;0.4091;0.4318;0.4545;0.4773;0.5000;0.5227;0.5455;0.5682;0.5909;0.6136;0.6364;0.6591;0.6818;0.7045;0.7273;0.7500;0.7727;0.7955;0.8182;0.8409;0.8636;0.8864;0.9091;0.9318;0.9545;0.9773;1.0000"
          begin="0.3s"
          dur="3.08s"
          fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Terminal background -->
  <rect width="800" height="540" rx="12" fill="#0D0B09"/>

  <!-- Title bar -->
  <rect width="800" height="40" rx="12" fill="#1a1714"/>
  <rect y="28" width="800" height="12" fill="#1a1714"/>
  <rect y="39" width="800" height="1" fill="#2e2a25"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="20" r="6" fill="#27c93f"/>

  <!-- Title bar text -->
  <text x="400" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#6b6358">nightjar — formal verification pipeline</text>

  <!-- Content area -->
  <g clip-path="url(#terminal-body-clip)">

    <!-- Prompt symbol -->
    <text x="20" y="70" font-family="monospace" font-size="14" fill="#d4920a" font-weight="bold">$</text>

    <!-- Command text revealed by clip-path animation -->
    <text x="40" y="70" font-family="monospace" font-size="14" fill="#f0ebe3" clip-path="url(#typing-clip)">nightjar verify --spec .card/payment.card.md</text>

    <!-- Typing cursor: tracks position, blinks, then hides after Enter -->
    <rect x="40" y="56" width="8" height="16" fill="#d4920a" opacity="0.9">
      <animate attributeName="opacity"
        values="0.9;0;0.9;0;0.9;0;0.9;0;0.9;0;0.9;0;0.9"
        keyTimes="0;0.04;0.08;0.12;0.16;0.20;0.24;0.28;0.32;0.36;0.40;0.44;0.5"
        dur="6s"
        begin="0s"
        fill="freeze"/>
      <animate attributeName="x"
        calcMode="discrete"
        values="40;48.4;56.8;65.2;73.6;82.0;90.4;98.8;107.2;115.6;124.0;132.4;140.8;149.2;157.6;166.0;174.4;182.8;191.2;199.6;208.0;216.4;224.8;233.2;241.6;250.0;258.4;266.8;275.2;283.6;292.0;300.4;308.8;317.2;325.6;334.0;342.4;350.8;359.2;367.6;376.0;384.4;392.8;401.2;409.6"
        keyTimes="0.0000;0.0227;0.0455;0.0682;0.0909;0.1136;0.1364;0.1591;0.1818;0.2045;0.2273;0.2500;0.2727;0.2955;0.3182;0.3409;0.3636;0.3864;0.4091;0.4318;0.4545;0.4773;0.5000;0.5227;0.5455;0.5682;0.5909;0.6136;0.6364;0.6591;0.6818;0.7045;0.7273;0.7500;0.7727;0.7955;0.8182;0.8409;0.8636;0.8864;0.9091;0.9318;0.9545;0.9773;1.0000"
        begin="0.3s"
        dur="3.08s"
        fill="freeze"/>
      <set attributeName="visibility" to="hidden" begin="3.68s"/>
    </rect>

    <!-- Output lines: instant reveal with set visibility -->

    <!-- Pipeline header at 3.88s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="3.88s"/>
      <text x="20" y="100" font-family="monospace" font-size="14" fill="#c8a97e" font-weight="bold">Nightjar Verification Pipeline</text>
    </g>

    <!-- Spec info at 4.08s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="4.08s"/>
      <text x="20" y="118" font-family="monospace" font-size="12" fill="#7a7168">Spec: payment  ·  3 invariants  ·  model: claude-sonnet-4-6</text>
    </g>

    <!-- Divider at 4.28s -->
    <line x1="20" y1="128" x2="780" y2="128" stroke="#2e2a25" stroke-width="1" visibility="hidden">
      <set attributeName="visibility" to="visible" begin="4.28s"/>
    </line>

    <!-- PASS Stage 0 at 4.48s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="4.48s"/>
      <text x="20" y="152" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="70" y="152" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 0</text>
      <text x="150" y="152" font-family="monospace" font-size="13" fill="#6b6358">(preflight)</text>
      <text x="720" y="152" font-family="monospace" font-size="12" fill="#4a4540">12ms</text>
    </g>

    <!-- PASS Stage 1 at 4.68s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="4.68s"/>
      <text x="20" y="173" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="70" y="173" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 1</text>
      <text x="150" y="173" font-family="monospace" font-size="13" fill="#6b6358">(deps)</text>
      <text x="720" y="173" font-family="monospace" font-size="12" fill="#4a4540">8ms</text>
    </g>

    <!-- PASS Stage 2 at 4.88s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="4.88s"/>
      <text x="20" y="194" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="70" y="194" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 2</text>
      <text x="150" y="194" font-family="monospace" font-size="13" fill="#6b6358">(schema)</text>
      <text x="720" y="194" font-family="monospace" font-size="12" fill="#4a4540">15ms</text>
    </g>

    <!-- FAIL Stage 3 at 5.08s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="5.08s"/>
      <text x="20" y="215" font-family="monospace" font-size="14" fill="#f85149" font-weight="bold">FAIL</text>
      <text x="70" y="215" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 3</text>
      <text x="150" y="215" font-family="monospace" font-size="13" fill="#6b6358">(property-tests)</text>
      <text x="720" y="215" font-family="monospace" font-size="12" fill="#4a4540">340ms</text>
    </g>

    <!-- Error block 1 at 5.28s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="5.28s"/>
      <rect x="26" y="222" width="728" height="42" rx="3" fill="#1a0e0d"/>
      <rect x="26" y="222" width="3" height="42" fill="#f85149"/>
      <text x="36" y="238" font-family="monospace" font-size="12" fill="#ff7b72">INV-01 violated:  result must be non-negative</text>
      <text x="36" y="256" font-family="monospace" font-size="11" fill="#7a7168" font-style="italic">counterexample: apply_discount(-1) → -0.9  (negative input produces negative result)</text>
    </g>

    <!-- Error block 2 at 5.48s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="5.48s"/>
      <rect x="26" y="268" width="728" height="42" rx="3" fill="#1a0e0d"/>
      <rect x="26" y="268" width="3" height="42" fill="#f85149"/>
      <text x="36" y="284" font-family="monospace" font-size="12" fill="#ff7b72">INV-02 violated:  result must be less than x</text>
      <text x="36" y="302" font-family="monospace" font-size="11" fill="#7a7168" font-style="italic">counterexample: apply_discount(0) → 0.0  (zero input: 0.0 is not less than 0)</text>
    </g>

    <!-- SKIP Stage 4 at 5.68s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="5.68s"/>
      <text x="20" y="330" font-family="monospace" font-size="14" fill="#d4920a" font-weight="bold">SKIP</text>
      <text x="70" y="330" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 4</text>
      <text x="150" y="330" font-family="monospace" font-size="13" fill="#6b6358">(formal-proof)</text>
      <text x="720" y="330" font-family="monospace" font-size="12" fill="#4a4540">—</text>
    </g>

    <!-- Skip reason at 5.88s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="5.88s"/>
      <text x="26" y="347" font-family="monospace" font-size="12" fill="#4a4540">Skipped — Stage 3 must pass before Dafny proof</text>
    </g>

    <!-- Divider 2 at 6.08s -->
    <line x1="20" y1="357" x2="780" y2="357" stroke="#2e2a25" stroke-width="1" visibility="hidden">
      <set attributeName="visibility" to="visible" begin="6.08s"/>
    </line>

    <!-- Result block at 6.28s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="6.28s"/>
      <rect x="20" y="364" width="760" height="130" rx="6" fill="#160c0b" stroke="#4a1c1a" stroke-width="1"/>
      <text x="36" y="390" font-family="monospace" font-size="12" fill="#7a7168">Result</text>
      <rect x="620" y="375" width="142" height="22" rx="4" fill="#7a1f1c"/>
      <text x="691" y="390" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff" font-weight="bold">2 VIOLATIONS</text>
      <text x="36" y="418" font-family="monospace" font-size="12" fill="#7a7168">Trust level</text>
      <rect x="540" y="403" width="222" height="22" rx="4" fill="#1a2a3a" stroke="#1e3a5a" stroke-width="1"/>
      <text x="651" y="418" text-anchor="middle" font-family="monospace" font-size="11" fill="#6a9bc8" font-weight="bold">SCHEMA_VERIFIED (0.40)</text>
      <text x="36" y="460" font-family="monospace" font-size="12" fill="#4a4540">Total: 382ms  ·  Hypothesis found counterexamples before production</text>
      <text x="36" y="480" font-family="monospace" font-size="11" fill="#6b6358">Fix: update .card/payment.card.md invariants, then re-run nightjar build</text>
    </g>

  </g>
</svg>
