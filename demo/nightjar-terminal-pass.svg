<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <clipPath id="terminal-pass-body-clip">
      <rect x="0" y="42" width="800" height="458"/>
    </clipPath>
    <clipPath id="typing-clip-pass">
      <rect x="40" y="54" height="20" width="0">
        <animate
          attributeName="width"
          calcMode="discrete"
          values="0;8.4;16.8;25.2;33.6;42.0;50.4;58.8;67.2;75.6;84.0;92.4;100.8;109.2;117.6;126.0;134.4;142.8;151.2;159.6;168.0;176.4;184.8;193.2;201.6;210.0;218.4;226.8;235.2;243.6;252.0;260.4;268.8;277.2;285.6;294.0;302.4;310.8;319.2;327.6;336.0;344.4;352.8;361.2;369.6"
          keyTimes="0.0000;0.0227;0.0455;0.0682;0.0909;0.1136;0.1364;0.1591;0.1818;0.2045;0.2273;0.2500;0.2727;0.2955;0.3182;0.3409;0.3636;0.3864;0.4091;0.4318;0.4545;0.4773;0.5000;0.5227;0.5455;0.5682;0.5909;0.6136;0.6364;0.6591;0.6818;0.7045;0.7273;0.7500;0.7727;0.7955;0.8182;0.8409;0.8636;0.8864;0.9091;0.9318;0.9545;0.9773;1.0000"
          begin="0.3s"
          dur="3.08s"
          fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Terminal background -->
  <rect width="800" height="500" rx="12" fill="#0D0B09"/>

  <!-- Title bar -->
  <rect width="800" height="40" rx="12" fill="#1a1714"/>
  <rect y="28" width="800" height="12" fill="#1a1714"/>
  <rect y="39" width="800" height="1" fill="#2e2a25"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="20" r="6" fill="#27c93f"/>

  <!-- Title bar text -->
  <text x="400" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#6b6358">nightjar — formal verification pipeline</text>

  <!-- Content area -->
  <g clip-path="url(#terminal-pass-body-clip)">

    <!-- Prompt symbol -->
    <text x="20" y="70" font-family="monospace" font-size="14" fill="#d4920a" font-weight="bold">$</text>

    <!-- Command text revealed by clip-path animation -->
    <text x="40" y="70" font-family="monospace" font-size="14" fill="#f0ebe3" clip-path="url(#typing-clip-pass)">nightjar verify --spec .card/payment.card.md</text>

    <!-- Typing cursor: tracks position, blinks, then hides after Enter -->
    <rect x="40" y="56" width="8" height="16" fill="#d4920a" opacity="0.9">
      <animate attributeName="opacity"
        values="0.9;0;0.9;0;0.9;0;0.9;0;0.9;0;0.9;0;0.9"
        keyTimes="0;0.04;0.08;0.12;0.16;0.20;0.24;0.28;0.32;0.36;0.40;0.44;0.5"
        dur="6s"
        begin="0s"
        fill="freeze"/>
      <animate attributeName="x"
        calcMode="discrete"
        values="40;48.4;56.8;65.2;73.6;82.0;90.4;98.8;107.2;115.6;124.0;132.4;140.8;149.2;157.6;166.0;174.4;182.8;191.2;199.6;208.0;216.4;224.8;233.2;241.6;250.0;258.4;266.8;275.2;283.6;292.0;300.4;308.8;317.2;325.6;334.0;342.4;350.8;359.2;367.6;376.0;384.4;392.8;401.2;409.6"
        keyTimes="0.0000;0.0227;0.0455;0.0682;0.0909;0.1136;0.1364;0.1591;0.1818;0.2045;0.2273;0.2500;0.2727;0.2955;0.3182;0.3409;0.3636;0.3864;0.4091;0.4318;0.4545;0.4773;0.5000;0.5227;0.5455;0.5682;0.5909;0.6136;0.6364;0.6591;0.6818;0.7045;0.7273;0.7500;0.7727;0.7955;0.8182;0.8409;0.8636;0.8864;0.9091;0.9318;0.9545;0.9773;1.0000"
        begin="0.3s"
        dur="3.08s"
        fill="freeze"/>
      <set attributeName="visibility" to="hidden" begin="3.68s"/>
    </rect>

    <!-- Output lines: all-pass run -->

    <!-- Pipeline header at 3.88s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="3.88s"/>
      <text x="20" y="100" font-family="monospace" font-size="14" fill="#c8a97e" font-weight="bold">Nightjar Verification Pipeline</text>
    </g>

    <!-- Spec info at 4.08s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="4.08s"/>
      <text x="20" y="118" font-family="monospace" font-size="12" fill="#7a7168">Spec: payment  ·  3 invariants  ·  model: claude-sonnet-4-6</text>
    </g>

    <!-- Divider at 4.28s -->
    <line x1="20" y1="128" x2="780" y2="128" stroke="#2e2a25" stroke-width="1" visibility="hidden">
      <set attributeName="visibility" to="visible" begin="4.28s"/>
    </line>

    <!-- PASS Stage 0 at 4.48s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="4.48s"/>
      <text x="20" y="152" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="70" y="152" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 0</text>
      <text x="150" y="152" font-family="monospace" font-size="13" fill="#6b6358">(preflight)</text>
      <text x="720" y="152" font-family="monospace" font-size="12" fill="#4a4540">12ms</text>
    </g>

    <!-- PASS Stage 1 at 4.68s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="4.68s"/>
      <text x="20" y="173" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="70" y="173" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 1</text>
      <text x="150" y="173" font-family="monospace" font-size="13" fill="#6b6358">(deps)</text>
      <text x="720" y="173" font-family="monospace" font-size="12" fill="#4a4540">8ms</text>
    </g>

    <!-- PASS Stage 2 at 4.88s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="4.88s"/>
      <text x="20" y="194" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="70" y="194" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 2</text>
      <text x="150" y="194" font-family="monospace" font-size="13" fill="#6b6358">(schema)</text>
      <text x="720" y="194" font-family="monospace" font-size="12" fill="#4a4540">15ms</text>
    </g>

    <!-- PASS Stage 2.5 at 5.08s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="5.08s"/>
      <text x="20" y="215" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="70" y="215" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 2.5</text>
      <text x="166" y="215" font-family="monospace" font-size="13" fill="#6b6358">(negation-proof)</text>
      <text x="720" y="215" font-family="monospace" font-size="12" fill="#4a4540">220ms</text>
    </g>

    <!-- PASS Stage 3 at 5.28s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="5.28s"/>
      <text x="20" y="236" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="70" y="236" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 3</text>
      <text x="150" y="236" font-family="monospace" font-size="13" fill="#6b6358">(property-tests)</text>
      <text x="720" y="236" font-family="monospace" font-size="12" fill="#4a4540">318ms</text>
    </g>

    <!-- Dafny verifying hint at 5.48s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="5.48s"/>
      <text x="20" y="257" font-family="monospace" font-size="13" fill="#4a4540">  verifying with Dafny 4.x...</text>
    </g>

    <!-- PASS Stage 4 replaces hint at 6.28s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="6.28s"/>
      <rect x="0" y="242" width="800" height="22" fill="#0D0B09"/>
      <text x="20" y="257" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="70" y="257" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 4</text>
      <text x="150" y="257" font-family="monospace" font-size="13" fill="#6b6358">(formal-proof)</text>
      <text x="720" y="257" font-family="monospace" font-size="12" fill="#4a4540">4.2s</text>
    </g>

    <!-- Divider 2 at 6.48s -->
    <line x1="20" y1="267" x2="780" y2="267" stroke="#2e2a25" stroke-width="1" visibility="hidden">
      <set attributeName="visibility" to="visible" begin="6.48s"/>
    </line>

    <!-- Result block at 6.68s -->
    <g visibility="hidden">
      <set attributeName="visibility" to="visible" begin="6.68s"/>
      <rect x="20" y="274" width="760" height="196" rx="6" fill="#0a1a0c" stroke="#1a4a1e" stroke-width="1"/>
      <rect x="20" y="274" width="4" height="196" rx="2" fill="#3fb950"/>
      <text x="40" y="300" font-family="monospace" font-size="12" fill="#7a7168">Result</text>
      <rect x="604" y="285" width="158" height="22" rx="4" fill="#1a4a1e"/>
      <text x="683" y="300" text-anchor="middle" font-family="monospace" font-size="11" fill="#3fb950" font-weight="bold">ALL STAGES PASSED</text>
      <text x="40" y="328" font-family="monospace" font-size="12" fill="#7a7168">Trust level</text>
      <rect x="540" y="313" width="222" height="22" rx="4" fill="#1a3a2a" stroke="#1e5a3a" stroke-width="1"/>
      <text x="651" y="328" text-anchor="middle" font-family="monospace" font-size="11" fill="#4ade80" font-weight="bold">FORMALLY_VERIFIED (1.00)</text>
      <text x="40" y="356" font-family="monospace" font-size="12" fill="#7a7168">Proof cert</text>
      <text x="200" y="356" font-family="monospace" font-size="12" fill="#4a4540">.card/audit/payment.dfy.proof  (sha256: 3f9a...)</text>
      <text x="40" y="390" font-family="monospace" font-size="12" fill="#4a4540">Total: 4.8s  ·  Dafny proved all 3 postconditions with zero counterexamples</text>
      <rect x="40" y="408" width="720" height="40" rx="4" fill="#0f2a14" stroke="#1e5a1e" stroke-width="1"/>
      <text x="400" y="433" text-anchor="middle" font-family="monospace" font-size="13" fill="#3fb950" font-weight="bold">Formally Verified  ·  Safe to ship  ·  nightjar ship payment</text>
    </g>

  </g>
</svg>
