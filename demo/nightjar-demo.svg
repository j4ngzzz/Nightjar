<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <clipPath id="content-clip">
      <rect x="0" y="42" width="800" height="458"/>
    </clipPath>
  </defs>

  <!-- Terminal background (warm dark) -->
  <rect width="800" height="500" rx="12" fill="#0d0b09"/>

  <!-- Title bar -->
  <rect width="800" height="40" rx="12" fill="#1a1714"/>
  <rect y="28" width="800" height="12" fill="#1a1714"/>
  <rect y="39" width="800" height="1" fill="#2e2a25"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="20" r="6" fill="#27c93f"/>

  <!-- Title bar text -->
  <text x="400" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#6b6358">nightjar — formal verification pipeline</text>

  <!-- Content area -->
  <g clip-path="url(#content-clip)">

    <!-- LINE 0: command prompt -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.3s" fill="freeze"/>
      <text x="26" y="72" font-family="monospace" font-size="14" fill="#d4920a" font-weight="bold">$</text>
      <text x="40" y="72" font-family="monospace" font-size="14" fill="#f0ebe3" font-weight="bold">nightjar verify --spec .card/payment.card.md</text>
    </g>

    <!-- LINE 1: pipeline header -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.3s" fill="freeze"/>
      <text x="26" y="99" font-family="monospace" font-size="14" fill="#c8a97e" font-weight="bold">Nightjar Verification Pipeline</text>
    </g>

    <!-- LINE 2: spec info -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.3s" fill="freeze"/>
      <text x="26" y="117" font-family="monospace" font-size="12" fill="#7a7168">Spec: payment  ·  3 invariants  ·  model: claude-sonnet-4-6</text>
    </g>

    <!-- divider line 1 -->
    <rect x="26" y="125" width="748" height="1" fill="#2e2a25" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.2s" fill="freeze"/>
    </rect>

    <!-- LINE 3: Stage 0 PASS -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.3s" fill="freeze"/>
      <text x="26" y="148" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="78" y="148" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 0</text>
      <text x="156" y="148" font-family="monospace" font-size="13" fill="#6b6358">(preflight)</text>
      <text x="700" y="148" font-family="monospace" font-size="12" fill="#4a4540">12ms</text>
    </g>

    <!-- LINE 4: Stage 1 PASS -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.3s" fill="freeze"/>
      <text x="26" y="170" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="78" y="170" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 1</text>
      <text x="156" y="170" font-family="monospace" font-size="13" fill="#6b6358">(deps)</text>
      <text x="700" y="170" font-family="monospace" font-size="12" fill="#4a4540">8ms</text>
    </g>

    <!-- LINE 5: Stage 2 PASS -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.7s" dur="0.3s" fill="freeze"/>
      <text x="26" y="192" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="78" y="192" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 2</text>
      <text x="156" y="192" font-family="monospace" font-size="13" fill="#6b6358">(schema)</text>
      <text x="700" y="192" font-family="monospace" font-size="12" fill="#4a4540">15ms</text>
    </g>

    <!-- LINE 6: Stage 3 FAIL -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.1s" dur="0.3s" fill="freeze"/>
      <text x="26" y="214" font-family="monospace" font-size="14" fill="#f85149" font-weight="bold">FAIL</text>
      <text x="78" y="214" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 3</text>
      <text x="156" y="214" font-family="monospace" font-size="13" fill="#6b6358">(property-tests)</text>
      <text x="700" y="214" font-family="monospace" font-size="12" fill="#4a4540">340ms</text>
    </g>

    <!-- Error block 1 background -->
    <rect x="32" y="221" width="714" height="40" rx="3" fill="#1a0e0d" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.3s" fill="freeze"/>
    </rect>
    <rect x="32" y="221" width="3" height="40" fill="#f85149" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.3s" fill="freeze"/>
    </rect>

    <!-- Error block 1 text -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.3s" fill="freeze"/>
      <text x="42" y="237" font-family="monospace" font-size="12" fill="#ff7b72">INV-01 violated:  result must be non-negative</text>
      <text x="42" y="254" font-family="monospace" font-size="11" fill="#7a7168" font-style="italic">counterexample: apply_discount(-1) → -0.9  (negative input produces negative result)</text>
    </g>

    <!-- Error block 2 background -->
    <rect x="32" y="265" width="714" height="40" rx="3" fill="#1a0e0d" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.3s" fill="freeze"/>
    </rect>
    <rect x="32" y="265" width="3" height="40" fill="#f85149" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.3s" fill="freeze"/>
    </rect>

    <!-- Error block 2 text -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.3s" fill="freeze"/>
      <text x="42" y="281" font-family="monospace" font-size="12" fill="#ff7b72">INV-02 violated:  result must be less than x</text>
      <text x="42" y="298" font-family="monospace" font-size="11" fill="#7a7168" font-style="italic">counterexample: apply_discount(0) → 0.0  (zero input: 0.0 is not less than 0)</text>
    </g>

    <!-- LINE 7: Stage 4 SKIP -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.2s" dur="0.3s" fill="freeze"/>
      <text x="26" y="325" font-family="monospace" font-size="14" fill="#d4920a" font-weight="bold">SKIP</text>
      <text x="78" y="325" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 4</text>
      <text x="156" y="325" font-family="monospace" font-size="13" fill="#6b6358">(formal-proof)</text>
      <text x="700" y="325" font-family="monospace" font-size="12" fill="#4a4540">—</text>
    </g>

    <!-- Skip reason -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.3s" fill="freeze"/>
      <text x="32" y="342" font-family="monospace" font-size="12" fill="#4a4540">Skipped — Stage 3 must pass before Dafny proof</text>
    </g>

    <!-- divider line 2 -->
    <rect x="26" y="352" width="748" height="1" fill="#2e2a25" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.8s" dur="0.2s" fill="freeze"/>
    </rect>

    <!-- Result block background -->
    <rect x="26" y="360" width="748" height="118" rx="6" fill="#160c0b" stroke="#4a1c1a" stroke-width="1" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="5.1s" dur="0.4s" fill="freeze"/>
    </rect>

    <!-- Result block content -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="5.1s" dur="0.4s" fill="freeze"/>

      <!-- Result label + badge -->
      <text x="42" y="385" font-family="monospace" font-size="12" fill="#7a7168">Result</text>
      <rect x="636" y="370" width="120" height="22" rx="4" fill="#7a1f1c"/>
      <text x="696" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff" font-weight="bold" letter-spacing="0.5">2 VIOLATIONS</text>

      <!-- Trust level + badge -->
      <text x="42" y="413" font-family="monospace" font-size="12" fill="#7a7168">Trust level</text>
      <rect x="554" y="398" width="202" height="22" rx="4" fill="#1a2a3a" stroke="#1e3a5a" stroke-width="1"/>
      <text x="655" y="413" text-anchor="middle" font-family="monospace" font-size="11" fill="#6a9bc8" font-weight="bold">SCHEMA_VERIFIED (0.40)</text>

      <!-- Timing note -->
      <text x="42" y="456" font-family="monospace" font-size="12" fill="#4a4540">Total: 382ms  ·  Hypothesis found counterexamples before production</text>
    </g>

  </g>
</svg>
