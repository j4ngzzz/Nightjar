<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');

      text {
        font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
        font-size: 13px;
      }

      .cmd      { fill: #f0f6fc; font-weight: bold; }
      .prompt   { fill: #58a6ff; }
      .comment  { fill: #6e7681; font-style: italic; }
      .header   { fill: #d2a8ff; font-weight: bold; font-size: 14px; }
      .sub      { fill: #8b949e; font-size: 12px; }
      .pass     { fill: #3fb950; font-weight: bold; }
      .fail     { fill: #f85149; font-weight: bold; }
      .skip     { fill: #d29922; font-weight: bold; }
      .muted    { fill: #6e7681; }
      .dim      { fill: #484f58; font-size: 12px; }
      .err-line { fill: #ff7b72; font-size: 12px; }
      .err-hint { fill: #8b949e; font-size: 11.5px; font-style: italic; }
      .warn     { fill: #d29922; font-size: 12px; }
      .normal   { fill: #c9d1d9; }
      .green-txt{ fill: #7ee787; font-size: 12px; }
      .badge-fail-txt  { fill: #fff; font-weight: bold; font-size: 11px; letter-spacing: 0.05em; }
      .badge-trust-txt { fill: #58a6ff; font-weight: bold; font-size: 11px; letter-spacing: 0.05em; }
      .kw       { fill: #ff7b72; }
      .fn-name  { fill: #d2a8ff; }
      .string   { fill: #a5d6ff; }
      .number   { fill: #79c0ff; }

      /* Animation classes for each visual row */
      .a0  { opacity: 0; animation: fade-in 0.25s ease forwards 0.3s; }
      .a1  { opacity: 0; animation: fade-in 0.25s ease forwards 0.8s; }
      .a2  { opacity: 0; animation: fade-in 0.25s ease forwards 1.0s; }
      .a3  { opacity: 0; animation: fade-in 0.25s ease forwards 1.3s; }
      .a4  { opacity: 0; animation: fade-in 0.25s ease forwards 1.5s; }
      .a5  { opacity: 0; animation: fade-in 0.25s ease forwards 1.7s; }
      .a6  { opacity: 0; animation: fade-in 0.25s ease forwards 1.9s; }
      .a7  { opacity: 0; animation: fade-in 0.25s ease forwards 2.2s; }
      .a8  { opacity: 0; animation: fade-in 0.25s ease forwards 2.8s; }
      .a9  { opacity: 0; animation: fade-in 0.25s ease forwards 3.0s; }
      .a10 { opacity: 0; animation: fade-in 0.25s ease forwards 3.2s; }
      .a11 { opacity: 0; animation: fade-in 0.25s ease forwards 3.5s; }
      .a12 { opacity: 0; animation: fade-in 0.25s ease forwards 3.8s; }
      .a13 { opacity: 0; animation: fade-in 0.25s ease forwards 4.0s; }
      .a14 { opacity: 0; animation: fade-in 0.25s ease forwards 4.2s; }
      .a15 { opacity: 0; animation: fade-in 0.25s ease forwards 4.5s; }
      .a16 { opacity: 0; animation: fade-in 0.25s ease forwards 4.8s; }
      .a17 { opacity: 0; animation: fade-in 0.25s ease forwards 5.0s; }
      .a18 { opacity: 0; animation: fade-in 0.25s ease forwards 5.3s; }
      .a19 { opacity: 0; animation: fade-in 0.25s ease forwards 5.6s; }
      .a20 { opacity: 0; animation: fade-in 0.5s ease forwards 5.9s; }

      @keyframes fade-in {
        from { opacity: 0; transform: translateY(3px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .typing-cmd {
        clip-path: inset(0 100% 0 0);
        animation: type-reveal 0.5s steps(42, end) forwards 0.3s;
      }
      @keyframes type-reveal {
        from { clip-path: inset(0 100% 0 0); }
        to   { clip-path: inset(0 0% 0 0); }
      }
    </style>
  </defs>

  <!-- Terminal shell -->
  <rect width="800" height="560" rx="12" fill="#0d1117"/>
  <rect width="800" height="40" rx="12" fill="#161b22"/>
  <rect y="28" width="800" height="12" fill="#161b22"/>
  <rect y="39" width="800" height="1" fill="#21262d"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>
  <text x="80" y="24" class="sub">nightjar — catching vibe-coded bugs</text>

  <g>

    <!-- Section label: the vibe-coded function -->
    <g class="a0" transform="translate(26, 68)">
      <text x="0" y="0" class="comment"># AI-generated checkout.py — looks fine, right?</text>
    </g>

    <g class="a1" transform="translate(26, 87)">
      <text x="0" y="0" class="kw">def </text>
      <text x="26" y="0" class="fn-name">apply_coupon</text>
      <text x="113" y="0" class="normal">(price: float, coupon_pct: float) -&gt; float:</text>
    </g>
    <g class="a2" transform="translate(26, 105)">
      <text x="20" y="0" class="comment"># Apply percentage discount: e.g. coupon_pct=10 means 10% off</text>
    </g>
    <g class="a3" transform="translate(26, 122)">
      <text x="20" y="0" class="kw">return </text>
      <text x="61" y="0" class="normal">price * (</text>
      <text x="116" y="0" class="number">1</text>
      <text x="123" y="0" class="normal"> - coupon_pct / </text>
      <text x="218" y="0" class="number">100</text>
      <text x="236" y="0" class="normal">)</text>
    </g>

    <!-- Divider -->
    <rect class="a4" x="26" y="134" width="748" height="1" fill="#21262d"/>

    <!-- nightjar verify command -->
    <g class="a5" transform="translate(26, 154)">
      <text x="0"  y="0" class="prompt">$</text>
      <text x="14" y="0" class="cmd typing-cmd">nightjar verify --spec .card/checkout.card.md</text>
    </g>

    <!-- Pipeline header -->
    <g class="a6" transform="translate(26, 178)">
      <text x="0" y="0" class="header">Nightjar Verification Pipeline</text>
    </g>
    <g class="a7" transform="translate(26, 195)">
      <text x="0" y="0" class="sub">Spec: checkout  ·  4 invariants  ·  model: claude-sonnet-4-6</text>
    </g>

    <!-- Divider -->
    <rect class="a7" x="26" y="204" width="748" height="1" fill="#21262d"/>

    <!-- Stage 0 -->
    <g class="a8" transform="translate(26, 223)">
      <text x="0"   y="0" class="pass">PASS</text>
      <text x="52"  y="0" class="normal">Stage 0  </text>
      <text x="134" y="0" class="muted">(preflight)</text>
      <text x="290" y="0" class="dim">11ms</text>
    </g>

    <!-- Stage 1 -->
    <g class="a9" transform="translate(26, 243)">
      <text x="0"   y="0" class="pass">PASS</text>
      <text x="52"  y="0" class="normal">Stage 1  </text>
      <text x="134" y="0" class="muted">(deps)</text>
      <text x="290" y="0" class="dim">9ms</text>
    </g>

    <!-- Stage 2 -->
    <g class="a10" transform="translate(26, 263)">
      <text x="0"   y="0" class="pass">PASS</text>
      <text x="52"  y="0" class="normal">Stage 2  </text>
      <text x="134" y="0" class="muted">(schema)</text>
      <text x="290" y="0" class="dim">14ms</text>
    </g>

    <!-- Stage 3 FAIL -->
    <g class="a11" transform="translate(26, 283)">
      <text x="0"   y="0" class="fail">FAIL</text>
      <text x="52"  y="0" class="normal">Stage 3  </text>
      <text x="134" y="0" class="muted">(property-tests)</text>
      <text x="290" y="0" class="dim">412ms</text>
    </g>

    <!-- Error block 1 bg -->
    <rect class="a12" x="32" y="289" width="716" height="36" rx="3" fill="rgba(248,81,73,0.07)"/>
    <rect class="a12" x="32" y="289" width="3" height="36" fill="#f85149"/>
    <g class="a12" transform="translate(42, 304)">
      <text x="0" y="0" class="err-line">INV-03 violated:  final price must be &gt;= 0.0</text>
    </g>
    <g class="a13" transform="translate(42, 318)">
      <text x="0" y="0" class="err-hint">counterexample: apply_coupon(50.0, 150) → -25.0  (coupon &gt; 100% produces negative price)</text>
    </g>

    <!-- Error block 2 bg -->
    <rect class="a14" x="32" y="332" width="716" height="36" rx="3" fill="rgba(248,81,73,0.07)"/>
    <rect class="a14" x="32" y="332" width="3" height="36" fill="#f85149"/>
    <g class="a14" transform="translate(42, 347)">
      <text x="0" y="0" class="err-line">INV-04 violated:  discounted price must not exceed original</text>
    </g>
    <g class="a15" transform="translate(42, 361)">
      <text x="0" y="0" class="err-hint">counterexample: apply_coupon(100.0, -20) → 120.0  (negative coupon inflates price)</text>
    </g>

    <!-- Warning note about input validation -->
    <g class="a16" transform="translate(32, 383)">
      <text x="0" y="0" class="warn">  Missing guard: coupon_pct must be in [0, 100] — no input validation in generated code</text>
    </g>

    <!-- Stage 4 SKIP -->
    <g class="a17" transform="translate(26, 403)">
      <text x="0"   y="0" class="skip">SKIP</text>
      <text x="52"  y="0" class="normal">Stage 4  </text>
      <text x="134" y="0" class="muted">(formal-proof)</text>
      <text x="290" y="0" class="dim">—</text>
    </g>

    <!-- Divider -->
    <rect class="a18" x="26" y="416" width="748" height="1" fill="#21262d"/>

    <!-- Result block -->
    <g class="a20">
      <rect x="26" y="424" width="748" height="106" rx="6" fill="rgba(248,81,73,0.06)" stroke="rgba(248,81,73,0.25)" stroke-width="1"/>

      <text x="42" y="449" class="sub">Result</text>
      <rect x="680" y="434" width="80" height="22" rx="4" fill="#da3633"/>
      <text x="720" y="449" text-anchor="middle" class="badge-fail-txt">2 VIOLATIONS</text>

      <text x="42" y="475" class="sub">Trust level</text>
      <rect x="604" y="460" width="156" height="22" rx="4" fill="#1f3a5c" stroke="#1d4070" stroke-width="1"/>
      <text x="682" y="475" text-anchor="middle" class="badge-trust-txt">SCHEMA_VERIFIED (0.40)</text>

      <text x="42" y="498" class="dim">Total: 449ms  ·  2 missing guards caught by Hypothesis before production</text>
      <text x="42" y="516" class="green-txt">  Fix: add assert 0 &lt;= coupon_pct &lt;= 100 and assert price &gt;= 0 before return</text>
    </g>

  </g>
</svg>
