<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560">
  <defs>
    <clipPath id="content-clip">
      <rect x="0" y="42" width="800" height="518"/>
    </clipPath>
  </defs>

  <!-- Terminal background (warm dark) -->
  <rect width="800" height="560" rx="12" fill="#0d0b09"/>

  <!-- Title bar -->
  <rect width="800" height="40" rx="12" fill="#1a1714"/>
  <rect y="28" width="800" height="12" fill="#1a1714"/>
  <rect y="39" width="800" height="1" fill="#2e2a25"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="20" r="6" fill="#27c93f"/>

  <!-- Title bar text -->
  <text x="400" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#6b6358">nightjar — catching vibe-coded bugs</text>

  <!-- Content area -->
  <g clip-path="url(#content-clip)">

    <!-- Section label -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.3s" fill="freeze"/>
      <text x="26" y="68" font-family="monospace" font-size="12" fill="#4a4540" font-style="italic"># AI-generated checkout.py — looks fine, right?</text>
    </g>

    <!-- Code: def apply_coupon(...) -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.3s" fill="freeze"/>
      <text x="26" y="88" font-family="monospace" font-size="13" fill="#f07b6b">def </text>
      <text x="55" y="88" font-family="monospace" font-size="13" fill="#c89de0">apply_coupon</text>
      <text x="154" y="88" font-family="monospace" font-size="13" fill="#c9c1b6">(price: float, coupon_pct: float) -&gt; float:</text>
    </g>

    <!-- Code: comment line -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.3s" fill="freeze"/>
      <text x="46" y="107" font-family="monospace" font-size="13" fill="#4a4540" font-style="italic"># Apply percentage discount: e.g. coupon_pct=10 means 10% off</text>
    </g>

    <!-- Code: return line -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.3s" dur="0.3s" fill="freeze"/>
      <text x="46" y="126" font-family="monospace" font-size="13" fill="#f07b6b">return </text>
      <text x="96" y="126" font-family="monospace" font-size="13" fill="#c9c1b6">price * (</text>
      <text x="172" y="126" font-family="monospace" font-size="13" fill="#79c0e8">1</text>
      <text x="181" y="126" font-family="monospace" font-size="13" fill="#c9c1b6"> - coupon_pct / </text>
      <text x="307" y="126" font-family="monospace" font-size="13" fill="#79c0e8">100</text>
      <text x="334" y="126" font-family="monospace" font-size="13" fill="#c9c1b6">)</text>
    </g>

    <!-- horizontal divider -->
    <rect x="26" y="138" width="748" height="1" fill="#2e2a25" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.2s" fill="freeze"/>
    </rect>

    <!-- verify command -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.3s" fill="freeze"/>
      <text x="26" y="160" font-family="monospace" font-size="14" fill="#d4920a" font-weight="bold">$</text>
      <text x="40" y="160" font-family="monospace" font-size="14" fill="#f0ebe3" font-weight="bold">nightjar verify --spec .card/checkout.card.md</text>
    </g>

    <!-- Pipeline header -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.3s" fill="freeze"/>
      <text x="26" y="185" font-family="monospace" font-size="14" fill="#c8a97e" font-weight="bold">Nightjar Verification Pipeline</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.5s" dur="0.3s" fill="freeze"/>
      <text x="26" y="203" font-family="monospace" font-size="12" fill="#7a7168">Spec: checkout  ·  4 invariants  ·  model: claude-sonnet-4-6</text>
    </g>

    <!-- divider -->
    <rect x="26" y="211" width="748" height="1" fill="#2e2a25" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.7s" dur="0.2s" fill="freeze"/>
    </rect>

    <!-- Stage 0 PASS -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.9s" dur="0.3s" fill="freeze"/>
      <text x="26" y="232" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="78" y="232" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 0</text>
      <text x="156" y="232" font-family="monospace" font-size="13" fill="#6b6358">(preflight)</text>
      <text x="700" y="232" font-family="monospace" font-size="12" fill="#4a4540">11ms</text>
    </g>

    <!-- Stage 1 PASS -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.3s" fill="freeze"/>
      <text x="26" y="252" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="78" y="252" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 1</text>
      <text x="156" y="252" font-family="monospace" font-size="13" fill="#6b6358">(deps)</text>
      <text x="700" y="252" font-family="monospace" font-size="12" fill="#4a4540">9ms</text>
    </g>

    <!-- Stage 2 PASS -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.3s" fill="freeze"/>
      <text x="26" y="272" font-family="monospace" font-size="14" fill="#3fb950" font-weight="bold">PASS</text>
      <text x="78" y="272" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 2</text>
      <text x="156" y="272" font-family="monospace" font-size="13" fill="#6b6358">(schema)</text>
      <text x="700" y="272" font-family="monospace" font-size="12" fill="#4a4540">14ms</text>
    </g>

    <!-- Stage 3 FAIL -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.3s" fill="freeze"/>
      <text x="26" y="292" font-family="monospace" font-size="14" fill="#f85149" font-weight="bold">FAIL</text>
      <text x="78" y="292" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 3</text>
      <text x="156" y="292" font-family="monospace" font-size="13" fill="#6b6358">(property-tests)</text>
      <text x="700" y="292" font-family="monospace" font-size="12" fill="#4a4540">412ms</text>
    </g>

    <!-- Error block 1 -->
    <rect x="32" y="299" width="714" height="40" rx="3" fill="#1a0e0d" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.1s" dur="0.3s" fill="freeze"/>
    </rect>
    <rect x="32" y="299" width="3" height="40" fill="#f85149" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.1s" dur="0.3s" fill="freeze"/>
    </rect>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.1s" dur="0.3s" fill="freeze"/>
      <text x="42" y="316" font-family="monospace" font-size="12" fill="#ff7b72">INV-03 violated:  final price must be &gt;= 0.0</text>
      <text x="42" y="333" font-family="monospace" font-size="11" fill="#7a7168" font-style="italic">counterexample: apply_coupon(50.0, 150) → -25.0  (coupon &gt; 100% produces negative price)</text>
    </g>

    <!-- Error block 2 -->
    <rect x="32" y="343" width="714" height="40" rx="3" fill="#1a0e0d" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.3s" fill="freeze"/>
    </rect>
    <rect x="32" y="343" width="3" height="40" fill="#f85149" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.3s" fill="freeze"/>
    </rect>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.3s" fill="freeze"/>
      <text x="42" y="360" font-family="monospace" font-size="12" fill="#ff7b72">INV-04 violated:  discounted price must not exceed original</text>
      <text x="42" y="377" font-family="monospace" font-size="11" fill="#7a7168" font-style="italic">counterexample: apply_coupon(100.0, -20) → 120.0  (negative coupon inflates price)</text>
    </g>

    <!-- Warning about missing guard -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.8s" dur="0.3s" fill="freeze"/>
      <text x="32" y="398" font-family="monospace" font-size="12" fill="#d4920a">  Missing guard: coupon_pct must be in [0, 100] — no input validation in generated code</text>
    </g>

    <!-- Stage 4 SKIP -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="5.1s" dur="0.3s" fill="freeze"/>
      <text x="26" y="418" font-family="monospace" font-size="14" fill="#d4920a" font-weight="bold">SKIP</text>
      <text x="78" y="418" font-family="monospace" font-size="14" fill="#c9c1b6">Stage 4</text>
      <text x="156" y="418" font-family="monospace" font-size="13" fill="#6b6358">(formal-proof)</text>
      <text x="700" y="418" font-family="monospace" font-size="12" fill="#4a4540">—</text>
    </g>

    <!-- divider -->
    <rect x="26" y="428" width="748" height="1" fill="#2e2a25" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="5.3s" dur="0.2s" fill="freeze"/>
    </rect>

    <!-- Result block background -->
    <rect x="26" y="436" width="748" height="104" rx="6" fill="#160c0b" stroke="#4a1c1a" stroke-width="1" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="5.6s" dur="0.4s" fill="freeze"/>
    </rect>

    <!-- Result block content -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="5.6s" dur="0.4s" fill="freeze"/>

      <text x="42" y="461" font-family="monospace" font-size="12" fill="#7a7168">Result</text>
      <rect x="636" y="446" width="120" height="22" rx="4" fill="#7a1f1c"/>
      <text x="696" y="461" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff" font-weight="bold">2 VIOLATIONS</text>

      <text x="42" y="489" font-family="monospace" font-size="12" fill="#7a7168">Trust level</text>
      <rect x="554" y="474" width="202" height="22" rx="4" fill="#1a2a3a" stroke="#1e3a5a" stroke-width="1"/>
      <text x="655" y="489" text-anchor="middle" font-family="monospace" font-size="11" fill="#6a9bc8" font-weight="bold">SCHEMA_VERIFIED (0.40)</text>

      <text x="42" y="519" font-family="monospace" font-size="12" fill="#4a7a4a">  Fix: assert 0 &lt;= coupon_pct &lt;= 100 and assert price &gt;= 0 before return</text>
    </g>

  </g>
</svg>
